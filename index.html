<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碧鳳 | 產品經理 | LinkedIn 風格個人特色</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f2ef;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            background-color: #ffffff;
            border: 1px solid #d4d4d4;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-image: url("https://dummyimage.com/800x200/ddd/888.png&text=您的背景圖片");
            background-size: cover;
            background-position: center;
            height: 200px;
        }

        .profile {
            display: flex;
            align-items: center;
            padding: 20px;
        }

        .profile img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #ffffff;
            margin-right: 20px;
        }

        .profile h1 {
            margin: 0;
            font-size: 24px;
        }

        .profile p {
            margin: 5px 0;
            color: #777777;
        }

        .content {
            padding: 20px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section h2 {
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .section p {
            line-height: 1.6;
        }

        .skills-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
        }

        .skills-list li {
            background-color: #f1f1f1;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 5px;
        }

        .experience-item, .education-item {
            margin-bottom: 15px;
        }

        .experience-item h3, .education-item h3 {
            margin: 0;
            font-size: 18px;
        }

        .experience-item p, .education-item p {
            margin: 5px 0;
            color: #777777;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"></div>
        <div class="profile">
            <img src="images/ttt.jpg" alt="王小明 的相片"> 
            <div>
                <h1>碧鳳</h1>
                <p>產品經理 | [您的核心技能]</p>
                <p>[您的所在地]</p>
            </div>
        </div>
        <div class="content">
            <div class="section">
                <h2>關於我</h2>
                <p>[請在這裡撰寫一段簡短的個人介紹，突出您的專業背景和核心優勢。]</p>
            </div>
            <div class="section">
                <h2>技能</h2>
                <ul class="skills-list">
                    <li>[技能1]</li>
                    <li>[技能2]</li>
                    <li>[技能3]</li>
                    <li>[技能4]</li>
                    <li>[技能5]</li>
                    </ul>
            </div>
            <div class="section">
                <h2>工作經驗</h2>
                <div class="experience-item">
                    <h3>[公司名稱]</h3>
                    <p>[職位]</p>
                    <p>[工作期間]</p>
                    <p>[請在這裡列出您的工作內容和成就，建議使用條列式。]</p>
                </div>
                <div class="experience-item">
                    <h3>[前公司名稱]</h3>
                    <p>[前職位]</p>
                    <p>[前工作期間]</p>
                    <p>[請在這裡列出您的工作內容和成就。]</p>
                </div>
            </div>
            <div class="section">
                <h2>教育背景</h2>
                <div class="education-item">
                    <h3>[學校名稱]</h3>
                    <p>[學位]</p>
                    <p>[就讀期間]</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
